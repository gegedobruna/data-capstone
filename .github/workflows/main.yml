name: Databricks CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-deploy-run:
    name: Validate, Deploy and Run Bundle
    runs-on: ubuntu-latest

    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      SQL_WAREHOUSE_ID: "6d3a6392d8691ed6"
      GENIE_SPACE_ID: "01f1699b3c5718c395e11d9877d814d0"
      GOLD_CATALOG: "dbx_metadata_governance_dev"
      GOLD_SCHEMA: "gold"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Verify Databricks authentication
        run: |
          databricks current-user me

      - name: Validate bundle
        run: |
          databricks bundle validate -t dev

      - name: Deploy bundle
        run: |
          databricks bundle deploy -t dev

      - name: Run Metadata Medallion workflow
        run: |
          databricks bundle run Metadata_Medallion -t dev
